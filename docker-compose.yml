services:
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_DATABASE}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    depends_on:
      keycloak-db:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_DATABASE}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: compose
      SERVER_PORT: 8081
      APP_KEYCLOAK_URL: http://keycloak:8080
      APP_KEYCLOAK_PUBLIC_URL: http://localhost:${KEYCLOAK_PORT}
      APP_KEYCLOAK_REALM: ${APP_KEYCLOAK_REALM}
      APP_KEYCLOAK_CLIENT_ID: ${APP_KEYCLOAK_CLIENT_ID}
      APP_SECURITY_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT}
    ports:
      - "${BACKEND_PORT}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/shop/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT}
      KEYCLOAK_REALM: ${APP_KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${APP_KEYCLOAK_CLIENT_ID}
    ports:
      - "${FRONTEND_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
